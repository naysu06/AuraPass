# ============================================================
#  AuraPass - Apache HTTP Server Configuration
#  Bundled with Laragon portable stack
# ============================================================

# ── Path Definitions (Portable & Relative) ───────────────
# This finds the directory where httpd.exe is located
Define SRVROOT "C:/AuraPass/laragon/bin/apache/httpd-2.4.62-240904-win64-VS17"

# This assumes your app is 3 levels up from the Apache bin folder
Define APPROOT "${SRVROOT}/../../../../"
Define PHPDIR  "${SRVROOT}/../../php/php-8.3.26-Win32-vs16-x64"

ServerRoot "${SRVROOT}"

# ── Port ─────────────────────────────────────────────────
Listen 8000

# ── Modules ──────────────────────────────────────────────
LoadModule access_compat_module modules/mod_access_compat.so
LoadModule actions_module modules/mod_actions.so
LoadModule alias_module modules/mod_alias.so
LoadModule allowmethods_module modules/mod_allowmethods.so
LoadModule auth_basic_module modules/mod_auth_basic.so
LoadModule authn_core_module modules/mod_authn_core.so
LoadModule authn_file_module modules/mod_authn_file.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule authz_groupfile_module modules/mod_authz_groupfile.so
LoadModule authz_host_module modules/mod_authz_host.so
LoadModule authz_user_module modules/mod_authz_user.so
LoadModule autoindex_module modules/mod_autoindex.so
LoadModule cgi_module modules/mod_cgi.so
LoadModule dir_module modules/mod_dir.so
LoadModule env_module modules/mod_env.so
LoadModule headers_module modules/mod_headers.so
LoadModule include_module modules/mod_include.so
LoadModule isapi_module modules/mod_isapi.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule mime_module modules/mod_mime.so
LoadModule negotiation_module modules/mod_negotiation.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule setenvif_module modules/mod_setenvif.so
LoadModule socache_shmcb_module modules/mod_socache_shmcb.so
LoadModule ssl_module modules/mod_ssl.so
LoadModule version_module modules/mod_version.so

# ── PHP Module ───────────────────────────────────────────
LoadModule php_module "${PHPDIR}/php8apache2_4.dll"
PHPIniDir "${PHPDIR}"
AddHandler application/x-httpd-php .php

# ── Server Identity ──────────────────────────────────────
ServerAdmin admin@example.com
ServerName localhost:8000

# ── Deny all by default ──────────────────────────────────
<Directory />
    AllowOverride none
    Require all denied
</Directory>

# ── Document Root → Laravel public/ ─────────────────────
DocumentRoot "${APPROOT}/public"
# 1. THE FRONT DOOR (This keeps the 403 away from your main app)
<Directory "C:/AuraPass/public">
    Options Indexes FollowSymLinks MultiViews
    AllowOverride All
    Require all granted
</Directory>
# 2. THE STORAGE VAULT (This keeps the 403 away from your photos)
<Directory "C:/AuraPass/storage/app/public">
    Options Indexes FollowSymLinks MultiViews
    AllowOverride All
    Require all granted
</Directory>

# ── Directory Index ──────────────────────────────────────
<IfModule dir_module>
    DirectoryIndex index.php index.html
</IfModule>

# ── Block .htaccess from being served ───────────────────
<Files ".ht*">
    Require all denied
</Files>

# ── Logging ──────────────────────────────────────────────
ErrorLog "logs/error.log"
LogLevel error

<IfModule log_config_module>
    LogFormat "%h %l %u %t \"%r\" %>s %b" common
    CustomLog "logs/access.log" common
</IfModule>

# ── MIME Types ───────────────────────────────────────────
<IfModule mime_module>
    TypesConfig conf/mime.types
    AddType application/x-compress .Z
    AddType application/x-gzip .gz .tgz
    AddType image/x-icon .ico
    AddType image/webp .webp
    AddType image/jpeg .jpg .jpeg
    AddType image/png .png
</IfModule>

# ── Windows performance settings ─────────────────────────
AcceptFilter http none
AcceptFilter https none
EnableSendfile Off
EnableMMAP Off

<IfModule mpm_winnt_module>
    ThreadStackSize 8388608
</IfModule>

# ── SSL ──────────────────────────────────────────────────
<IfModule ssl_module>
    SSLRandomSeed startup builtin
    SSLRandomSeed connect builtin
</IfModule>

<IfModule headers_module>
    RequestHeader unset Proxy early
</IfModule>
